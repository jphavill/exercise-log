services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: exercise
      POSTGRES_USER: exercise
      POSTGRES_PASSWORD: exercise
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - appnet

  backend:
    build:
      context: ./backend
    init: true
    environment:
      DATABASE_URL: postgresql+psycopg://exercise:exercise@postgres:5432/exercise
      AUTO_SEED: "true"
    command: sh -c "alembic -c alembic.ini upgrade head && exec uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      - postgres
    networks:
      - appnet

  frontend:
    build:
      context: ./frontend
    networks:
      - appnet

  caddy:
    image: caddy:2.9-alpine
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - backend
      - frontend
    networks:
      - appnet

volumes:
  postgres_data:

networks:
  appnet:
    driver: bridge
