<div class="shell">
  <header class="topbar">
    <h1>Exercise Tracker</h1>
    <nav>
      <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <ng-icon name="navDashboard" aria-hidden="true"></ng-icon>
        <span>Dashboard</span>
      </a>
      <a class="nav-link" routerLink="/exercises" routerLinkActive="active">
        <ng-icon name="navExercises" aria-hidden="true"></ng-icon>
        <span>Exercises</span>
      </a>
    </nav>
  </header>
  <main>
    <router-outlet></router-outlet>
  </main>

  <footer class="app-footer">
    <p class="footer-value">Track workouts. Build consistency.</p>
    <a class="footer-link" href="https://github.com/jphavill/exercise-log" target="_blank" rel="noopener noreferrer">
      <ng-icon name="brandGithub" aria-hidden="true"></ng-icon>
      <span>GitHub</span>
    </a>
  </footer>
</div>
