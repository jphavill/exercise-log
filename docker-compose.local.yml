services:
  caddy:
    image: caddy:2.9-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - public_web
    depends_on:
      - frontend
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    networks:
      - public_web

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    init: true
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-exercise}:${POSTGRES_PASSWORD:-exercise}@postgres:5432/${POSTGRES_DB:-exercise}
      - AUTO_SEED=${AUTO_SEED:-true}
      - POSTGRES_USER=${POSTGRES_USER:-exercise}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-exercise}
      - POSTGRES_DB=${POSTGRES_DB:-exercise}
    command: sh -c "alembic -c alembic.ini upgrade head && exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    networks:
      - public_web
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-exercise}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-exercise}
      - POSTGRES_DB=${POSTGRES_DB:-exercise}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - public_web

networks:
  public_web:
    driver: bridge

volumes:
  postgres_data:
